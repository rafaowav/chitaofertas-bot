# fly.toml — Fly.io deployment config
app = "bot-ofertas-shopee"

[build]
  dockerfile = "Dockerfile"

[deploy]
  release_command = "npx prisma db push"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
